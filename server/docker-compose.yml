services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - PORT=3001
      - BASE_URL=${BASE_URL:-}
    volumes:
      - ./translations:/app/translations
      - ./versions:/app/versions
    expose:
      - "3001"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - app
