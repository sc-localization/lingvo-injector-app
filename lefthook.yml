pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx,js,mjs}"
      run: npx oxlint --type-aware --fix --deny-warnings {staged_files}
      stage_fixed: true
    format:
      glob: "*.{ts,tsx,js,mjs,json,scss,md}"
      run: npx oxfmt --write {staged_files}
      stage_fixed: true
    rust-fmt:
      glob: "*.rs"
      root: "src-tauri/"
      run: cargo fmt
      stage_fixed: true
