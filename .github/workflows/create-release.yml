name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to release (e.g. v0.6.1). If empty, uses the current ref.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify CHANGELOG.md has entry for this version
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag_name }}
        run: |
          if [ "$EVENT_NAME" == "workflow_dispatch" ] && [ -n "$INPUT_TAG" ]; then
            TAG_NAME="$INPUT_TAG"
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"
          fi

          VERSION="${TAG_NAME#v}"
          if ! grep -q "^## \[$VERSION\]" CHANGELOG.md; then
            echo "Error: No entry for version $VERSION found in CHANGELOG.md"
            exit 1
          fi
          echo "CHANGELOG.md entry found for $VERSION"

      - name: Verify Tag matches package.json
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag_name }}
        run: |
          if [ "$EVENT_NAME" == "workflow_dispatch" ] && [ -n "$INPUT_TAG" ]; then
            TAG_NAME="$INPUT_TAG"
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"
          fi

          TAG_VERSION="${TAG_NAME#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PACKAGE_VERSION"

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi

  quality-checks:
    name: Quality Checks
    needs: validate
    uses: ./.github/workflows/reusable-quality.yml
    with:
      force_all: false

  build:
    name: Build & Release
    needs: quality-checks
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    environment: release

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Dependencies
        uses: ./.github/actions/setup-dependencies
        with:
          node-version: '20'
          platform: ${{ matrix.platform }}

      - name: Generate Release Notes
        id: notes
        uses: ./.github/actions/generate-release-notes
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}

      - name: Detect Pre-release
        id: check-pre
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$REF_NAME" =~ (alpha|beta|rc|preview) ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Tauri Application
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.inputs.tag_name || github.ref_name }}
          releaseName: ${{ github.event.inputs.tag_name || github.ref_name }}
          releaseBody: ${{ steps.notes.outputs.release_body }}
          releaseDraft: true
          prerelease: ${{ steps.check-pre.outputs.is_prerelease == 'true' }}
