name: Quality Checks (Shared)

on:
  workflow_call:
    inputs:
      force_all:
        description: 'Force all checks even if files did not change'
        type: boolean
        default: false

jobs:
  check-changes:
    name: Check Changes
    runs-on: ubuntu-latest
    outputs:
      js: ${{ steps.filter.outputs.js }}
      rust: ${{ steps.filter.outputs.rust }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v5

      - name: Check for file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: .github/filters.yml

  frontend-checks:
    name: Frontend
    needs: check-changes
    runs-on: ubuntu-latest
    if: ${{ inputs.force_all || needs.check-changes.outputs.js == 'true' || needs.check-changes.outputs.ci == 'true' }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Dependencies
        uses: ./.github/actions/setup-dependencies
        with:
          node-version: '20'
          platform: ubuntu-latest
          cache-rust: 'false'
          install-rust: 'false'
          install-system-deps: 'false'

      - name: Run Oxlint
        run: npm run lint

      - name: Check Formatting (Oxfmt)
        run: npm run format:check

      - name: Type Check
        run: npm run typecheck

  rust-checks:
    name: Rust
    needs: check-changes
    runs-on: ubuntu-latest
    if: ${{ inputs.force_all || needs.check-changes.outputs.rust == 'true' || needs.check-changes.outputs.ci == 'true' }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Dependencies
        uses: ./.github/actions/setup-dependencies
        with:
          node-version: '20'
          platform: ubuntu-latest
          cache-rust: 'true'

      - name: Cargo Clippy
        working-directory: src-tauri
        run: cargo clippy --locked --all-targets -- -D warnings
        shell: bash

      - name: Cargo Fmt
        working-directory: src-tauri
        run: cargo fmt --check
        shell: bash

      - name: Cargo Test
        working-directory: src-tauri
        run: cargo test --locked
        shell: bash

  status-check:
    name: Quality Status
    needs: [check-changes, frontend-checks, rust-checks]
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Check Status
        run: |
          if [ "${{ needs.frontend-checks.result }}" != "success" ] && [ "${{ needs.frontend-checks.result }}" != "skipped" ]; then
            echo "Frontend checks failed"
            exit 1
          fi
          if [ "${{ needs.rust-checks.result }}" != "success" ] && [ "${{ needs.rust-checks.result }}" != "skipped" ]; then
            echo "Rust checks failed"
            exit 1
          fi
          echo "All checks passed or skipped"
