name: Setup Dependencies
description: Sets up Node.js, Rust, and platform-specific dependencies for Tauri monorepo

inputs:
  node-version:
    description: 'Node.js version to use'
    required: true
    default: '20'
  platform:
    description: 'Runner platform (e.g., ubuntu-latest, windows-latest)'
    required: true

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Cache Node.js modules
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: ${{ runner.os }}-node-

    - name: Install Dependencies (root + workspaces)
      run: npm ci
      shell: bash

    - name: Cache Rust dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo
          ./app/src-tauri/target
        key: ${{ runner.os }}-rust-${{ hashFiles('app/src-tauri/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-rust-

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable

    - name: Install Dependencies (Ubuntu only)
      if: inputs.platform == 'ubuntu-latest'
      run: |
        sudo apt update
        sudo apt install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      shell: bash
