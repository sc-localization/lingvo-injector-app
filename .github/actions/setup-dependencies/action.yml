name: Setup Dependencies
description: Sets up Node.js, Rust, and platform-specific dependencies for Tauri applications
inputs:
  node-version:
    description: 'Node.js version to use'
    required: true
    default: '20'
  platform:
    description: 'Runner platform (e.g., ubuntu-latest, windows-latest, macos-latest)'
    required: true
  cache-rust:
    description: 'Whether to cache Rust dependencies (disable for lint-only jobs)'
    required: false
    default: 'true'
  install-rust:
    description: 'Whether to install Rust toolchain'
    required: false
    default: 'true'
  install-system-deps:
    description: 'Whether to install platform system dependencies (GUI libs)'
    required: false
    default: 'true'
runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Cache Node.js modules
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: ${{ runner.os }}-node-

    - name: Install Frontend Dependencies
      run: npm ci
      shell: bash

    - name: Install Rust stable
      if: ${{ inputs.install-rust == 'true' }}
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
        components: rustfmt, clippy

    - name: Cache Rust dependencies
      if: ${{ inputs.cache-rust == 'true' && inputs.install-rust == 'true' }}
      uses: swatinem/rust-cache@v2
      with:
        workspaces: src-tauri -> target

    - name: Install Dependencies (Ubuntu only)
      if: inputs.platform == 'ubuntu-latest' && inputs.install-system-deps == 'true'
      run: |
        sudo apt update
        sudo apt install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm
      shell: bash
